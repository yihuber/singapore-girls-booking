<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">TIANYAO logo</title>
  <desc id="desc">Dark square logo with rose gold crescent, star mark, and TIANYAO wordmark.</desc>
  <defs>
    <linearGradient id="rose" x1="170" y1="150" x2="470" y2="510" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff2f2"/>
      <stop offset="0.34" stop-color="#e9c0c7"/>
      <stop offset="0.68" stop-color="#9e6672"/>
      <stop offset="1" stop-color="#f8dfe3"/>
    </linearGradient>
    <linearGradient id="softRose" x1="130" y1="120" x2="480" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7dce2"/>
      <stop offset="1" stop-color="#8d5966"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="640" fill="#150a12"/>
  <rect width="640" height="640" fill="#0f070d" opacity="0.46"/>
