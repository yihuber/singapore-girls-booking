    <path d="M376 183C317 178 251 220 225 287c-32 82 4 173 79 213" fill="none" stroke="url(#rose)" stroke-width="5" stroke-linecap="round" opacity="0.88"/>
    <path d="M323 132C323 132 320 245 267 284 231 311 190 312 190 312c0 0 75 4 108 36 31 31 25 91 25 91s0-74 38-104c34-27 91-23 91-23s-64-5-95-38c-32-34-34-142-34-142Z" fill="none" stroke="url(#rose)" stroke-width="6" stroke-linejoin="round"/>
    <path d="M323 245c-11 30-29 52-55 68 28 8 48 24 60 50 11-29 29-49 55-62-27-9-47-28-60-56Z" fill="#f8e5e7" opacity="0.1"/>
    <path d="M400 196c6 22 18 34 38 39-20 5-32 18-38 40-6-22-18-35-38-40 20-5 32-17 38-39Z" fill="#f9e6e9"/>
